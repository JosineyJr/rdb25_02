worker_processes  auto;

events {
    use epoll;
    worker_connections 2048;
    multi_accept on;
}

http {
    proxy_buffering off;
    proxy_request_buffering off;
    tcp_nopush on;
    tcp_nodelay on;

    upstream rinha-api-dev {
        least_conn;
        keepalive 300;
        server rinha-api-1:9997 max_fails=3 fail_timeout=1s;
        server rinha-api-2:9998 max_fails=3 fail_timeout=1s;
    }

    server {
        listen 9999 backlog=8192;
        keepalive_timeout 65s;
        keepalive_requests 10000;

        location / { 
            proxy_pass http://rinha-api-dev;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # --- O AJUSTE FINAL ---
            # Damos um pouco mais de tempo para o NGINX estabelecer a conexão
            # com uma API que está sob carga máxima.
            proxy_connect_timeout 2s;

            # Mantemos o tempo de leitura baixo, porque sabemos que, uma vez
            # que a conexão é aceite, a sua API responde muito rapidamente.
            proxy_read_timeout    250ms;

            proxy_next_upstream error;
        }
    }
}
